ai:
  server:
    host: 0.0.0.0
    port: 8080
    enable_ssl: false
    ssl_cert_file: ""
    ssl_key_file: ""
  provider:
    type: openai_compatible
  openai_compatible:
    base_url: https://api.deepseek.com/v1
    api_key: "sk-0c2ef3af68c841aa92ab2eae60f57c41"
    default_model: deepseek-chat
    connect_timeout_ms: 10000
    request_timeout_ms: 180000
  anthropic:
    base_url: https://api.anthropic.com
    api_key: "YOUR_ANTHROPIC_API_KEY"
    default_model: claude-3-5-sonnet-20241022
    api_version: "2023-06-01"
    connect_timeout_ms: 3000
    request_timeout_ms: 120000
  chat:
    require_sid: true
    max_context_messages: 20
    history_load_limit: 20
    history_query_limit_max: 200
    max_context_tokens: 4096
    recent_window_messages: 20
    summary_trigger_tokens: 3072
    summary_max_tokens: 512
    default_temperature: 0.7
    default_max_tokens: 1024
    system_prompt: ""
    summary_prompt: "你是对话摘要助手。请把旧对话压缩成简洁、可延续上下文的中文摘要，保留人物偏好、事实、约束、未完成任务。"
  auth:
    token_ttl_seconds: 2592000
    password_pbkdf2_iterations: 150000
  mysql:
    host: 127.0.0.1
    port: 3306
    user: ai_chat_user
    password: "ai_chat_122699"
    database: ai_chat
    charset: utf8mb4
    connect_timeout_seconds: 5
    pool_min_size: 2
    pool_max_size: 8
    pool_acquire_timeout_ms: 3000
  persist:
    queue_capacity: 10000
    flush_interval_ms: 200
    batch_size: 128
  rag:
    enabled: true
    recall_trigger_mode: intent   # always | intent
    recall_intent_min_chars: 6
    top_k: 6
    score_threshold: 0.45
    max_snippet_chars: 400
  embedding:
    provider: ollama
    base_url: http://127.0.0.1:11434
    model: mxbai-embed-large
    connect_timeout_ms: 3000
    request_timeout_ms: 30000
  vector_store:
    qdrant:
      base_url: http://127.0.0.1:6333
      collection: chat_memory
      request_timeout_ms: 5000
  rag_indexer:
    queue_capacity: 10000
    batch_size: 32
    flush_interval_ms: 200
    assistant_index_mode: fact_like   # all | fact_like | none
    assistant_min_chars: 24
    dedup_ttl_ms: 600000              # 0 与 dedup_max_entries=0 一起可关闭去重
    dedup_max_entries: 50000

# Scheduler/IO defaults:
# - iomanager.use_caller: true  -> single IOM mode in ai/main.cc (io=accept)
# - fiber.pool.enabled: false   -> matches current benchmark-preferred default
# You can override these values per deployment needs.
iomanager:
  use_caller: true

fiber:
  pool:
    enabled: false
    max_size: 1000
    min_keep: 10
    idle_timeout: 60000
